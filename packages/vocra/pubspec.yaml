name: vocra
description: >
  The voice layer for Flutter: talk to an AI that talks back — natural
  turn-taking, lifelike speech, streaming replies, on-device with your own
  provider keys.
version: 0.2.0
repository: https://github.com/abdelrahman-shehata99/vocra/tree/main/packages/vocra
issue_tracker: https://github.com/abdelrahman-shehata99/vocra/issues
homepage: https://www.vocra.cloud
topics:
  - voice
  - speech-to-text
  - text-to-speech
  - voice-assistant
  - ai
resolution: workspace

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  vocra_core: ^0.2.0
  just_audio: ^0.10.6
  record: ^7.1.1
  audio_session: ^0.2.4
  permission_handler: ^12.0.3
  flutter_secure_storage: ^10.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  flutter_lints: ^6.0.0
  permission_handler_platform_interface: ^4.2.0
  plugin_platform_interface: ^2.1.8

flutter:
  # v1's happy path needs none of this — mic capture comes from the `record`
  # plugin via FlutterMicSource. This native plugin registration exists only
  # for the *optional* full-duplex native AEC module (spec §9, T18):
  # NativeAecMicSource talks to it over a MethodChannel/EventChannel pair,
  # and nothing else in the package touches it.
  plugin:
    platforms:
      android:
        package: com.vocra.voice_flutter
        pluginClass: VoiceFlutterPlugin
      ios:
        pluginClass: VoiceFlutterPlugin
