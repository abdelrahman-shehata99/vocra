name: vocra_core
description: >
  Pure-Dart brain of the Vocra voice AI SDK: engine, provider adapters, and
  transport. No Flutter dependency — see vocra_flutter for the platform layer.
version: 0.1.0
publish_to: 'none'
resolution: workspace

environment:
  sdk: ^3.12.0

dependencies:
  dio: ^5.7.0
  web_socket_channel: ^3.0.1

dev_dependencies:
  test: ^1.25.0
  mocktail: ^1.0.4
  lints: ^6.0.0
  stream_channel: ^2.1.4
