name: vocra_core
description: >
  Pure-Dart engine behind Vocra: streaming voice-AI orchestration (STT to LLM
  to TTS) with pluggable Groq, OpenAI, Gemini, xAI, Z.ai, Deepgram, and
  ElevenLabs providers.
version: 0.2.1
repository: https://github.com/abdelrahman-shehata99/vocra-demo
issue_tracker: https://github.com/abdelrahman-shehata99/vocra-demo/issues
homepage: https://www.vocra.cloud
topics:
  - voice
  - speech-to-text
  - text-to-speech
  - voice-assistant
  - ai
resolution: workspace

environment:
  sdk: ^3.12.0

dependencies:
  dio: ^5.7.0
  web_socket_channel: ^3.0.1

dev_dependencies:
  test: ^1.25.0
  mocktail: ^1.0.4
  lints: ^6.0.0
  stream_channel: ^2.1.4
